services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    environment:
      API_GATEWAY_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8083
      USER_SERVICE_URL: http://user-service:8084
      ROUTE_SERVICE_URL: http://route-service:8081
      ACTIVITY_SERVICE_URL: http://activity-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      route-service:
        condition: service_started
      activity-service:
        condition: service_started
      notification-service:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    environment:
      AUTH_DATABASE_URL: postgres://dromos:dromos@auth-db:5432/dromos_auth
      AUTH_REDIS_URL: redis://redis:6379
      AUTH_SERVICE_PORT: 8083
      JWT_SECRET: dev-only-change-me
      USER_SERVICE_URL: http://user-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      auth-db:
        condition: service_healthy
      user-service:
        condition: service_started
      redis:
        condition: service_started
      notification-service:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    environment:
      USER_DATABASE_URL: postgres://dromos:dromos@user-db:5432/dromos_users
      USER_SERVICE_PORT: 8084
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      user-db:
        condition: service_healthy

  route-service:
    build:
      context: .
      dockerfile: services/route_service/Dockerfile
    environment:
      ROUTE_SERVICE_DATABASE_URL: postgresql://dromos:dromos@route-db:5432/dromos_routes
      ROUTE_SERVICE_HOST: 0.0.0.0
      ROUTE_SERVICE_PORT: 8081
      GRAPHHOPPER_URL: https://graphhopper.com/api/1/
      GRAPHHOPPER_API_KEY: e909b3df-0be7-4575-9cce-9b6ef20a54af
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      route-db:
        condition: service_healthy

  activity-service:
    build:
      context: .
      dockerfile: services/activity_service/Dockerfile
    environment:
      ACTIVITY_DATABASE_URL: postgres://dromos:dromos@activity-db:5432/dromos_activities
      ACTIVITY_REDIS_ADDR: redis:6379
      ACTIVITY_SERVICE_ADDR: :8082
      USER_SERVICE_URL: http://user-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      activity-db:
        condition: service_healthy
      redis:
        condition: service_started
      user-service:
        condition: service_started
      notification-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    environment:
      NOTIFICATION_MONGO_URL: mongodb://notification-db:27017
      NOTIFICATION_DATABASE: dromos_notifications
      NOTIFICATION_SERVICE_PORT: 8086
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      notification-db:
        condition: service_started

  route-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: dromos_routes
      POSTGRES_USER: dromos
      POSTGRES_PASSWORD: dromos
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - route-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dromos -d dromos_routes"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dromos_auth
      POSTGRES_USER: dromos
      POSTGRES_PASSWORD: dromos
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dromos -d dromos_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dromos_users
      POSTGRES_USER: dromos
      POSTGRES_PASSWORD: dromos
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dromos -d dromos_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  activity-db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: dromos_activities
      POSTGRES_USER: dromos
      POSTGRES_PASSWORD: dromos
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - activity-db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dromos -d dromos_activities"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  notification-db:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - notification-db-data:/data/db

volumes:
  auth-db-data:
  user-db-data:
  route-db-data:
  activity-db-data:
  notification-db-data:
